<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake 3D Mobile</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #10b981;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            touch-action: none; /* Impede o scroll e zoom */
        }
        .stats {
            width: 90%; max-width: 500px;
            display: flex; justify-content: space-between;
            padding: 10px; font-family: 'Orbitron';
        }
        canvas {
            background: #000;
            border: 4px solid #1e293b;
            border-radius: 20px;
            width: 90vw; height: 90vw; /* Quadrado responsivo */
            max-width: 500px; max-height: 500px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        /* Telas de Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px;
            background: var(--accent); border: none;
            color: white; border-radius: 15px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(16,185,129,0.4);
        }
    </style>
</head>
<body>

    <div class="stats">
        <div>SCORE: <span id="score">0</span></div>
        <div id="foodLabel" style="color: var(--accent)"></div>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <!-- Tela Inicial (Necessária para Áudio e Mobile) -->
    <div id="startScreen" class="overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--accent);">SNAKE 3D</h1>
        <p>Deslize para mover a cobra</p>
        <button onclick="startGame()">INICIAR</button>
    </div>

    <!-- Tela de Game Over -->
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color: #ef4444;">FIM DE JOGO</h1>
        <div id="finalScore" style="font-size: 40px; margin-bottom: 20px;">0</div>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 30; 
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let food = {x: 5, y: 5};
    let currentFoodType = {name: "Maçã", color: "#ef4444"};
    let dx = 0, dy = 0;
    let score = 0;
    let isDead = false;
    let gameActive = false;

    // Áudio Sintetizado
    let audioCtx;
    function playSound(freq, endFreq, dur) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('startScreen').style.display = 'none';
        gameActive = true;
        dx = 1; dy = 0; // Começa movendo para direita
        loop();
    }

    // Lógica de Toque (Swipe)
    let tX = 0, tY = 0;
    document.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; }, false);
    document.addEventListener('touchmove', e => {
        if(!tX || !tY) return;
        let diffX = tX - e.touches[0].clientX;
        let diffY = tY - e.touches[0].clientY;
        if (Math.abs(diffX) > Math.abs(diffY)) {
            if (diffX > 30 && dx !== 1) { dx = -1; dy = 0; } // Esquerda
            else if (diffX < -30 && dx !== -1) { dx = 1; dy = 0; } // Direita
        } else {
            if (diffY > 30 && dy !== 1) { dx = 0; dy = -1; } // Cima
            else if (diffY < -30 && dy !== -1) { dx = 0; dy = 1; } // Baixo
        }
        tX = null; tY = null;
    }, false);

    // Teclado para PC
    document.addEventListener('keydown', e => {
        if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
        if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
        if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
    });

    function draw() {
        // Fundo
        ctx.fillStyle = "#050b14";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Comida 3D
        ctx.fillStyle = currentFoodType.color;
        ctx.beginPath();
        ctx.arc(food.x*gridSize+15, food.y*gridSize+15, 12, 0, 7);
        ctx.fill();

        // Cobra Contínua e Volumosa
        ctx.strokeStyle = "#4285F4";
        ctx.lineWidth = 26;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        snake.forEach((p, i) => {
            if(i === 0) ctx.moveTo(p.x*gridSize+15, p.y*gridSize+15);
            else ctx.lineTo(p.x*gridSize+15, p.y*gridSize+15);
        });
        ctx.stroke();

        // Olhos da cabeça
        const head = snake[0];
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(head.x*gridSize+10, head.y*gridSize+10, 5, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(head.x*gridSize+20, head.y*gridSize+10, 5, 0, 7); ctx.fill();
    }

    function update() {
        if(!gameActive || isDead) return;

        let h = {x: snake[0].x + dx, y: snake[0].y + dy};

        if(h.x < 0 || h.x >= tileCount || h.y < 0 || h.y >= tileCount || snake.some(p => p.x === h.x && p.y === h.y)) {
            isDead = true;
            playSound(150, 50, 0.5);
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').innerText = score;
            return;
        }

        snake.unshift(h);
        if(h.x === food.x && h.y === food.y) {
            score += 10;
            document.getElementById('score').innerText = score;
            playSound(600, 1000, 0.1);
            food = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
        } else {
            snake.pop();
        }
    }

    function loop() {
        update();
        draw();
        if(!isDead) setTimeout(loop, 120);
    }

    function resetGame() {
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        dx = 1; dy = 0; score = 0; isDead = false;
        document.getElementById('score').innerText = "0";
        document.getElementById('gameOver').style.display = 'none';
        loop();
    }
</script>
</body>
</html>
