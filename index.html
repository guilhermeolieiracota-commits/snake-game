<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake 3D Cartoon - Sound Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --bg-gradient: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            --panel-glass: rgba(15, 23, 42, 0.9);
            --accent-color: #10b981;
            --text-color: #f8fafc;
            --danger-color: #ef4444;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 1000px;
            padding: 15px 40px;
            background: var(--panel-glass);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .score-box span { 
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-color); 
            font-size: 32px;
        }

        canvas {
            background-color: #030712;
            border: 10px solid #1e293b;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 50px #000;
            max-width: 90vw;
            max-height: 75vh;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.98);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            display: none;
            border: 3px solid var(--danger-color);
            z-index: 100;
            box-shadow: 0 0 100px rgba(239, 68, 68, 0.4);
        }

        #gameOver.show { display: block; animation: popIn 0.3s ease-out; }

        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } }

        button {
            padding: 18px 50px;
            font-size: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
        }

        .start-hint {
            position: absolute;
            bottom: -30px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats-panel">
        <div class="score-box">PONTOS <span id="currentScore">0</span></div>
        <div style="font-weight: 800; font-size: 20px; display: flex; align-items: center; gap: 10px;">
            <span style="opacity: 0.5;">ALVO:</span> <span id="foodLabel"></span>
        </div>
    </div>

    <canvas id="gameCanvas" width="1000" height="1000"></canvas>

    <div id="gameOver">
        <h1 style="color: var(--danger-color); font-size: 60px; margin: 0;">FIM DE JOGO</h1>
        <p style="font-size: 24px; margin: 10px 0;">VOCÊ MARCOU</p>
        <div id="finalScore" style="color: var(--accent-color); font-size: 50px; font-family: 'Orbitron'; margin-bottom: 25px;">0</div>
        <button onclick="resetGame()">Tentar Novamente</button>
    </div>

    <div class="start-hint">Pressione qualquer seta para iniciar com som</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('currentScore');
    const finalScoreElement = document.getElementById('finalScore');
    const gameOverScreen = document.getElementById('gameOver');
    const foodLabel = document.getElementById('foodLabel');

    const gridSize = 40;
    const tileCount = canvas.width / gridSize;

    // --- LÓGICA DE ÁUDIO SINTETIZADO ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'eat') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'dead') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    const foodTypes = [
        { name: "Maçã", color: "#ef4444", type: "apple" },
        { name: "Uvas", color: "#a855f7", type: "grapes" },
        { name: "Laranja", color: "#fb923c", type: "orange" },
        { name: "Mirtilo", color: "#3b82f6", type: "berry" },
        { name: "Pera", color: "#bef264", type: "pear" }
    ];

    let snake = [{x: 12, y: 12}, {x: 11, y: 12}, {x: 10, y: 12}];
    let currentFood = foodTypes[0];
    let foodPos = {x: 5, y: 5};
    let dx = 0, dy = 0;
    let score = 0;
    let gameActive = false;
    let isDead = false;
    let gameSpeed = 110;

    function drawSnake() {
        const bodyColor = "#4285F4";
        const eyeColor = "#ffffff";
        const pupilColor = "#0d47a1";

        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = "rgba(0, 0, 0, 0.7)";
        ctx.shadowOffsetY = 12;

        ctx.strokeStyle = bodyColor;
        ctx.lineWidth = gridSize - 4;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        ctx.beginPath();
        snake.forEach((part, index) => {
            const x = part.x * gridSize + gridSize/2;
            const y = part.y * gridSize + gridSize/2;
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Brilho 3D superior
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = (gridSize - 4) / 2;
        ctx.beginPath();
        snake.forEach((part, index) => {
            const x = part.x * gridSize + gridSize/2;
            const y = (part.y * gridSize + gridSize/2) - 4;
            if (index === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Cabeça
        const head = snake[0];
        const hX = head.x * gridSize + gridSize/2;
        const hY = head.y * gridSize + gridSize/2;
        ctx.fillStyle = bodyColor;
        ctx.beginPath();
        ctx.arc(hX, hY, gridSize/2 + 2, 0, Math.PI * 2);
        ctx.fill();

        let angle = Math.atan2(dy, dx);
        if (dx === 0 && dy === 0) angle = -Math.PI / 2;

        ctx.translate(hX, hY);
        ctx.rotate(angle);

        // Olhos
        [-1, 1].forEach(side => {
            const ey = side * (gridSize/2);
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(2, ey, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = pupilColor;
            ctx.beginPath(); ctx.arc(5, ey, 4.5, 0, Math.PI*2); ctx.fill();
        });

        ctx.restore();
    }

    function drawFood() {
        const x = foodPos.x * gridSize + gridSize/2;
        const y = foodPos.y * gridSize + gridSize/2;
        const r = gridSize/2 - 5;
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = currentFood.color;
        ctx.fillStyle = currentFood.color;

        switch(currentFood.type) {
            case "apple":
                ctx.beginPath(); ctx.arc(x, y+3, r, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#16a34a"; ctx.fillRect(x-2, y-r-4, 4, 8);
                break;
            case "grapes":
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.arc(x-5+(i*5), y-5+(i%2*8), r/1.5, 0, Math.PI*2); ctx.fill();
                }
                break;
            case "orange":
                ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
                break;
            case "berry":
                ctx.beginPath(); ctx.arc(x, y, r-2, 0, Math.PI*2); ctx.fill();
                break;
            case "pear":
                ctx.beginPath(); ctx.arc(x, y+5, r, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x, y-5, r/1.4, 0, Math.PI*2); ctx.fill();
                break;
        }
        ctx.restore();
    }

    function drawBackground() {
        ctx.fillStyle = "#050b14";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.02)";
        for(let i=0; i<=canvas.width; i+=gridSize) {
            for(let j=0; j<=canvas.height; j+=gridSize) {
                ctx.beginPath(); ctx.arc(i+gridSize/2, j+gridSize/2, 1, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    function advanceSnake() {
        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

        if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
            playSound('dead');
            return endGame();
        }
        for (let i = 1; i < snake.length; i++) {
            if (snake[i].x === head.x && snake[i].y === head.y) {
                playSound('dead');
                return endGame();
            }
        }

        snake.unshift(head);

        if (head.x === foodPos.x && head.y === foodPos.y) {
            score += 10;
            scoreElement.innerText = score;
            playSound('eat');
            spawnFood();
            if (gameSpeed > 60) gameSpeed -= 1.5;
        } else {
            snake.pop();
        }
    }

    function spawnFood() {
        let valid = false;
        while(!valid) {
            foodPos = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            valid = !snake.some(p => p.x === foodPos.x && p.y === foodPos.y);
        }
        currentFood = foodTypes[Math.floor(Math.random() * foodTypes.length)];
        foodLabel.innerText = currentFood.name;
        foodLabel.style.color = currentFood.color;
    }

    function handleKey(e) {
        if([37, 38, 39, 40].includes(e.keyCode)) e.preventDefault();
        if (isDead) return;
        const key = e.keyCode;
        if (key === 37 && dx !== 1) { dx = -1; dy = 0; }
        else if (key === 38 && dy !== 1) { dx = 0; dy = -1; }
        else if (key === 39 && dx !== -1) { dx = 1; dy = 0; }
        else if (key === 40 && dy !== -1) { dx = 0; dy = 1; }
        if (!gameActive && (dx !== 0 || dy !== 0)) { gameActive = true; main(); }
    }

    function main() {
        if (!gameActive || isDead) return;
        setTimeout(() => {
            drawBackground();
            drawFood();
            advanceSnake();
            drawSnake();
            main();
        }, gameSpeed);
    }

    function endGame() {
        gameActive = false;
        isDead = true;
        finalScoreElement.innerText = score;
        gameOverScreen.classList.add('show');
    }

    function resetGame() {
        snake = [{x: 12, y: 12}, {x: 11, y: 12}, {x: 10, y: 12}];
        dx = 0; dy = 0; score = 0; gameSpeed = 110;
        isDead = false; gameActive = false;
        scoreElement.innerText = "0";
        gameOverScreen.classList.remove('show');
        spawnFood();
        drawBackground();
        drawFood();
        drawSnake();
    }

    document.addEventListener('keydown', handleKey);
    spawnFood();
    drawBackground();
    drawSnake();
</script>
</body>
</html>
