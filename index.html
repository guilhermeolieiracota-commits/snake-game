<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Slither Style - Arena Infinita</title>
    
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --accent: #4285F4;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            width: 100vw;
            height: 100dvh;
            overflow: hidden; 
            touch-action: none;
        }
        .stats {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90vw; max-width: 500px;
            display: flex; justify-content: space-between;
            padding: 12px 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(15, 23, 42, 0.75);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100dvh;
            background: #0c101b;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px;
            background: linear-gradient(135deg, #4285F4, #0d47a1); 
            border: none;
            color: white; border-radius: 15px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 25px rgba(66, 133, 244, 0.4);
            margin-top: 20px;
        }
        #joystick-base {
            position: absolute;
            width: 80px; height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: none;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            backdrop-filter: blur(2px);
        }
        #joystick-stick {
            position: absolute;
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #4285F4, #0d47a1);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }
    </style>
</head>
<body>
    <div class="stats">
        <div>SCORE: <span id="score" style="color: #40c4ff;">0</span></div>
        <div id="sizeDisplay" style="font-weight: 800;">TAMANHO: <span id="snakeSize" style="color: #10b981">3</span></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <div id="startScreen" class="overlay">
        <h1 style="font-family: 'Orbitron'; color: #4285F4; font-size: 36px; margin-bottom: 10px;">ARENA INFINITA</h1>
        <p style="color: #64748b; padding: 0 20px; max-width: 420px;">As bordas do mundo bloqueiam o movimento mas não matam! Cuidado apenas com os inimigos maiores.</p>
        <button onclick="startGame()">INICIAR</button>
    </div>

    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color: #ef4444; font-size: 36px; margin: 0; text-shadow: 0 0 20px rgba(239,68,68,0.3);">VOCÊ VIROU COMIDA</h1>
        <div id="finalScore" style="font-size: 50px; font-weight: bold; font-family: 'Orbitron'; color: #4285F4; margin-bottom: 20px;">0</div>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const joyBase = document.getElementById('joystick-base');
    const joyStick = document.getElementById('joystick-stick');
    
    const gridSize = 30; 
    const worldTiles = 60; 
    
    const foodTypes = [
        { name: "Maçã", color: "#ff4757", points: 10 },
        { name: "Uva", color: "#ffa502", points: 10 },
        { name: "Laranja", color: "#ff7f50", points: 10 },
        { name: "Mirtilo", color: "#2e86de", points: 10 },
        { name: "Pera", color: "#2ed573", points: 10 }
    ];

    let snake = [];
    let foods = [];
    const maxFoods = 40; 
    
    let dx = 0, dy = 0, score = 0, isDead = false, gameActive = false;

    let cameraX = 0;
    let cameraY = 0;

    let bots = [];
    const numBots = 5;
    const botColors = ["#ff4757", "#ffa502", "#a855f7", "#e84393"];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initBots() {
        bots = [];
        for(let i = 0; i < numBots; i++) {
            spawnBot();
        }
    }

    function spawnBot() {
        let bx = Math.floor(Math.random() * (worldTiles - 10)) + 5;
        let by = Math.floor(Math.random() * (worldTiles - 10)) + 5;
        let bColor = botColors[Math.floor(Math.random() * botColors.length)];
        bots.push({
            body: [{x: bx, y: by}, {x: bx, y: by}, {x: bx, y: by}, {x: bx, y: by}],
            dx: 0, dy: 0,
            color: bColor,
            isDead: false
        });
    }

    const logoImg = new Image();
    logoImg.src = 'icone.png';

    let audioCtx;
    function playEffect(type) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        const currentTime = audioCtx.currentTime;

        if(type === 'eat') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(450, currentTime);
            osc.frequency.exponentialRampToValueAtTime(950, currentTime + 0.08);
            g.gain.setValueAtTime(0.04, currentTime); g.gain.linearRampToValueAtTime(0, currentTime + 0.08);
            osc.start(currentTime); osc.stop(currentTime + 0.08);
        } else if(type === 'bite') {
            osc.type = 'square'; osc.frequency.setValueAtTime(300, currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, currentTime + 0.15);
            g.gain.setValueAtTime(0.08, currentTime); g.gain.linearRampToValueAtTime(0, currentTime + 0.15);
            osc.start(currentTime); osc.stop(currentTime + 0.15);
        } else if(type === 'dead') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(260, currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, currentTime + 0.35);
            g.gain.setValueAtTime(0.12, currentTime); g.gain.linearRampToValueAtTime(0, currentTime + 0.35);
            osc.start(currentTime); osc.stop(currentTime + 0.35);
        }
    }

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('startScreen').style.display = 'none';
        resetGame();
    }

    let startX = 0, startY = 0;
    let activeTouchId = null;

    document.addEventListener('touchstart', e => {
        if (!gameActive || isDead || activeTouchId !== null) return;
        const touch = e.changedTouches[0];
        activeTouchId = touch.identifier;
        startX = touch.clientX; startY = touch.clientY;
        
        joyBase.style.left = startX + 'px'; joyBase.style.top = startY + 'px';
        joyBase.style.display = 'block';
        joyStick.style.left = '50%'; joyStick.style.top = '50%';
    }, {passive: true});

    document.addEventListener('touchmove', e => {
        if (activeTouchId === null) return;
        let currentTouch = null;
        for (let t of e.touches) {
            if (t.identifier === activeTouchId) { currentTouch = t; break; }
        }
        if (!currentTouch) return;

        let diffX = currentTouch.clientX - startX;
        let diffY = currentTouch.clientY - startY;
        let distance = Math.sqrt(diffX*diffX + diffY*diffY);
        
        let maxDist = 35;
        if (distance > maxDist) {
            diffX = (diffX / distance) * maxDist;
            diffY = (diffY / distance) * maxDist;
        }
        joyStick.style.left = `calc(50% + ${diffX}px)`;
        joyStick.style.top = `calc(50% + ${diffY}px)`;

        if (distance > 12) {
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0 && dx !== -1) { dx = 1; dy = 0; }
                else if (diffX < 0 && dx !== 1) { dx = -1; dy = 0; }
            } else {
                if (diffY > 0 && dy !== -1) { dx = 0; dy = 1; }
                else if (diffY < 0 && dy !== 1) { dx = 0; dy = -1; }
            }
        }
    }, {passive: true});

    document.addEventListener('touchend', e => {
        for (let t of e.changedTouches) {
            if (t.identifier === activeTouchId) { activeTouchId = null; joyBase.style.display = 'none'; break; }
        }
    }, {passive: true});

    document.addEventListener('keydown', e => {
        if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
        if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
        if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
    });

    function updateCamera() {
        const headX = snake[0].x * gridSize + gridSize/2;
        const headY = snake[0].y * gridSize + gridSize/2;
        const padding = gridSize * 3;

        if (headX - cameraX < padding) cameraX = headX - padding;
        if (headX - cameraX > canvas.width - padding) cameraX = headX - (canvas.width - padding);
        if (headY - cameraY < padding) cameraY = headY - padding;
        if (headY - cameraY > canvas.height - padding) cameraY = headY - (canvas.height - padding);

        cameraX = Math.max(0, Math.min(cameraX, (worldTiles * gridSize) - canvas.width));
        cameraY = Math.max(0, Math.min(cameraY, (worldTiles * gridSize) - canvas.height));
    }

    function drawHexGrid() {
        ctx.strokeStyle = "#151a26"; ctx.lineWidth = 1.5;
        const hexRadius = 20; const hexHeight = hexRadius * Math.sqrt(3);
        
        const startCol = Math.max(-1, Math.floor(cameraX / (hexRadius * 1.5)) - 1);
        const endCol = Math.min((worldTiles * gridSize) / (hexRadius * 1.5) + 1, Math.floor((cameraX + canvas.width) / (hexRadius * 1.5)) + 2);
        const startRow = Math.max(-1, Math.floor(cameraY / hexHeight) - 1);
        const endRow = Math.min((worldTiles * gridSize) / hexHeight + 1, Math.floor((cameraY + canvas.height) / hexHeight) + 2);

        for (let row = startRow; row < endRow; row++) {
            for (let col = startCol; col < endCol; col++) {
                let cx = col * hexRadius * 1.5;
                let cy = row * hexHeight;
                if (col % 2 === 1) cy += hexHeight * 0.5;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    let angle = (Math.PI / 3) * i;
                    let x = cx + hexRadius * Math.cos(angle);
                    let y = cy + hexRadius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            }
        }
    }

    function draw() {
        ctx.fillStyle = "#0c101b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(-cameraX, -cameraY); 
        
        drawHexGrid();

        // Barreira Limitadora (Vermelho Neon)
        ctx.strokeStyle = "rgba(239, 68, 68, 0.7)"; ctx.lineWidth = 8;
        ctx.strokeRect(0, 0, worldTiles * gridSize, worldTiles * gridSize);
        
        // 1. Desenhar Comidas
        foods.forEach(f => {
            const cx = f.x * gridSize + gridSize/2; const cy = f.y * gridSize + gridSize/2;
            ctx.save();
            let foodGlow = ctx.createRadialGradient(cx, cy, 2, cx, cy, 14);
            foodGlow.addColorStop(0, '#ffffff'); foodGlow.addColorStop(0.3, f.type.color);
            foodGlow.addColorStop(0.7, f.type.color + '33'); foodGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = foodGlow;
            ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });

        // 2. Desenhar Bots
        bots.forEach(bot => {
            if(bot.isDead) return;
            ctx.save();
            ctx.shadowBlur = 8; ctx.shadowColor = bot.color;
            ctx.strokeStyle = bot.color; ctx.lineWidth = 18;
            ctx.lineJoin = "round"; ctx.lineCap = "round";
            ctx.beginPath();
            bot.body.forEach((p, i) => {
                if(i === 0) ctx.moveTo(p.x*gridSize+gridSize/2, p.y*gridSize+gridSize/2);
                else ctx.lineTo(p.x*gridSize+gridSize/2, p.y*gridSize+gridSize/2);
            });
            ctx.stroke();
            ctx.fillStyle = "white";
            let hX = bot.body[0].x*gridSize+gridSize/2, hY = bot.body[0].y*gridSize+gridSize/2;
            ctx.beginPath(); ctx.arc(hX-4, hY-4, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(hX+4, hY-4, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });

        // 3. Desenhar Jogador
        ctx.save();
        ctx.shadowBlur = 12; ctx.shadowColor = "rgba(64, 196, 255, 0.3)";
        ctx.strokeStyle = "#40c4ff"; ctx.lineWidth = 22;
        ctx.lineJoin = "round"; ctx.lineCap = "round";
        ctx.beginPath();
        snake.forEach((p, i) => {
            if(i === 0) ctx.moveTo(p.x*gridSize+gridSize/2, p.y*gridSize+gridSize/2);
            else ctx.lineTo(p.x*gridSize+gridSize/2, p.y*gridSize+gridSize/2);
        });
        ctx.stroke();
        ctx.restore();

        const h = snake[0];
        const hX = h.x * gridSize + gridSize/2; const hY = h.y * gridSize + gridSize/2;
        
        ctx.save();
        ctx.fillStyle = "#0091ea";
        ctx.beginPath(); ctx.arc(hX, hY, 13, 0, Math.PI * 2); ctx.fill();
        try {
            ctx.beginPath(); ctx.arc(hX, hY, 10, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(logoImg, hX - 10, hY - 10, 20, 20);
        } catch(e) {}
        ctx.restore();

        ctx.fillStyle = "white";
        let eyeX1 = 6, eyeY1 = 6, eyeX2 = 19, eyeY2 = 6;
        if (dx === -1) { eyeX1 = 3; eyeX2 = 3; eyeY1 = 6; eyeY2 = 19; } 
        else if (dx === 1) { eyeX1 = 22; eyeX2 = 22; eyeY1 = 6; eyeY2 = 19; } 
        else if (dy === 1) { eyeX1 = 6; eyeX2 = 19; eyeY1 = 22; eyeY2 = 22; } 
        ctx.beginPath(); ctx.arc(h.x*gridSize+eyeX1, h.y*gridSize+eyeY1, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x*gridSize+eyeX2, h.y*gridSize+eyeY2, 4, 0, Math.PI * 2); ctx.fill();
        
        ctx.restore(); 
    }

    function initFoods() {
        foods = [];
        for(let i = 0; i < maxFoods; i++) spawnFood();
    }

    function spawnFood() {
        foods.push({
            x: Math.floor(Math.random() * worldTiles), 
            y: Math.floor(Math.random() * worldTiles),
            type: foodTypes[Math.floor(Math.random() * foodTypes.length)]
        });
    }

    function triggerGameOver() {
        isDead = true; playEffect('dead'); 
        document.getElementById('gameOver').style.display = 'flex';
        document.getElementById('finalScore').innerText = score;
    }

    function update() {
        if(!gameActive || isDead) return;
        if (dx === 0 && dy === 0) return; 

        updateCamera(); 

        // 1. Movimento dos Bots (Com desvio de paredes)
        bots.forEach(bot => {
            if(bot.isDead) return;
            let closestFood = foods[0]; let minDist = Infinity;
            for(let f of foods) {
                let dist = Math.abs(bot.body[0].x - f.x) + Math.abs(bot.body[0].y - f.y);
                if(dist < minDist) { minDist = dist; closestFood = f; }
            }
            let moves = [{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
            moves = moves.filter(m => {
                let nx = bot.body[0].x + m.x; let ny = bot.body[0].y + m.y;
                // Impede bots de cruzarem as bordas
                if(nx < 0 || nx >= worldTiles || ny < 0 || ny >= worldTiles) return false;
                if(m.x === -bot.dx && m.y === -bot.dy) return false;
                return true;
            });
            if(moves.length > 0) {
                moves.sort((a,b) => {
                    let distA = Math.abs((bot.body[0].x + a.x) - closestFood.x) + Math.abs((bot.body[0].y + a.y) - closestFood.y);
                    let distB = Math.abs((bot.body[0].x + b.x) - closestFood.x) + Math.abs((bot.body[0].y + b.y) - closestFood.y);
                    return distA - distB;
                });
                bot.dx = moves[0].x; bot.dy = moves[0].y;
            }
            let botHead = {x: bot.body[0].x + bot.dx, y: bot.body[0].y + bot.dy};
            bot.body.unshift(botHead);
            let ateFoodIndex = -1;
            for(let f=0; f<foods.length; f++) {
                if(botHead.x === foods[f].x && botHead.y === foods[f].y) { ateFoodIndex = f; break; }
            }
            if(ateFoodIndex !== -1) { foods.splice(ateFoodIndex, 1); spawnFood(); } else { bot.body.pop(); }
        });

        // 2. Movimento do Jogador (PAREDE FÍSICA INVISÍVEL)
        let nX = snake[0].x + dx;
        let nY = snake[0].y + dy;
        
        // Se bater no limite, a coordenada é bloqueada (ela bate na parede e escorrega)
        if (nX < 0 || nX >= worldTiles || nY < 0 || nY >= worldTiles) {
            // Fica parada na borda esperando mudar de direção no joystick
            return; 
        }

        let h = {x: nX, y: nY};
        snake.unshift(h);
        
        let playerAteFood = -1;
        for(let f=0; f<foods.length; f++) {
            if(h.x === foods[f].x && h.y === foods[f].y) { playerAteFood = f; break; }
        }

        if(playerAteFood !== -1) {
            score += foods[playerAteFood].type.points; 
            document.getElementById('score').innerText = score;
            document.getElementById('snakeSize').innerText = snake.length;
            playEffect('eat'); foods.splice(playerAteFood, 1); spawnFood();
        } else { snake.pop(); }

        // 3. Sistema de Mordidas no Rabo e Canibalismo (Única forma de morrer!)
        let allSnakes = [{isPlayer: true, body: snake}].concat(bots.filter(b => !b.isDead));
        for (let s1 of allSnakes) {
            let head = s1.body[0]; if(!head) continue;
            for (let s2 of allSnakes) {
                if(s1 === s2 || s1.isDead || s2.isDead) continue;
                for (let i = 0; i < s2.body.length; i++) {
                    if (head.x === s2.body[i].x && head.y === s2.body[i].y) {
                        if (s1.body.length > s2.body.length) {
                            let cutLength = s2.body.length - i; s2.body.splice(i); 
                            for(let j=0; j<cutLength; j++) s1.body.push({...s1.body[s1.body.length-1]});
                            if (s1.isPlayer) {
                                score += cutLength * 15;
                                document.getElementById('score').innerText = score;
                                document.getElementById('snakeSize').innerText = snake.length;
                                playEffect('bite');
                            }
                            if (i === 0 || s2.body.length === 0) {
                                if (s2.isPlayer) return triggerGameOver(); else s2.isDead = true;
                            }
                        } else {
                            if (s1.isPlayer) return triggerGameOver(); 
                            else {
                                s1.body.forEach(p => foods.push({x: p.x, y: p.y, type: foodTypes[0]}));
                                s1.isDead = true;
                            }
                        }
                    }
                }
            }
        }
        if(bots.filter(b => !b.isDead).length < numBots) {
            if(Math.random() < 0.03) spawnBot();
        }
    }

    function loop() {
        update(); draw();
        if(!isDead) setTimeout(loop, 150);
    }

    function resetGame() {
        resizeCanvas();
        let startX = Math.floor(worldTiles / 2);
        let startY = Math.floor(worldTiles / 2);
        snake = [{x: startX, y: startY}, {x: startX-1, y: startY}, {x: startX-2, y: startY}];
        
        dx = 0; dy = 0; score = 0; isDead = false;
        cameraX = (startX * gridSize) - canvas.width / 2;
        cameraY = (startY * gridSize) - canvas.height / 2;
        
        document.getElementById('score').innerText = "0";
        document.getElementById('snakeSize').innerText = "3";
        document.getElementById('gameOver').style.display = 'none';
        
        initFoods(); initBots();
        gameActive = true; loop();
    }
</script>
</body>
</html>
