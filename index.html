<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake 3D Mobile</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #10b981;
        }
        
        * {
            box-sizing: border-box; /* Garante que os paddings não estraguem o layout mobile */
        }

        body {
            margin: 0; 
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            min-height: 100dvh; /* 100dvh resolve o bug da barra de navegação no celular */
            width: 100vw;
            overflow: hidden;
            touch-action: none; /* Impede o scroll e zoom */
        }

        .stats {
            width: 90vw; 
            max-width: 500px;
            display: flex; 
            justify-content: space-between;
            padding: 15px 20px; 
            font-family: 'Orbitron', sans-serif;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        canvas {
            background: #000;
            border: 4px solid #1e293b;
            border-radius: 20px;
            width: 90vw; 
            height: 90vw; /* Quadrado responsivo perfeito */
            max-width: 500px; 
            max-height: 500px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: block;
            margin: 0 auto;
        }

        /* Telas de Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

        button {
            padding: 20px 50px; font-size: 20px;
            background: var(--accent); border: none;
            color: white; border-radius: 15px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(16,185,129,0.4);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="stats">
        <div>SCORE: <span id="score">0</span></div>
        <div id="foodLabel" style="color: var(--accent)">Maçã</div>
    </div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <!-- Tela Inicial -->
    <div id="startScreen" class="overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--accent); font-size: 40px; margin-bottom: 10px;">SNAKE 3D</h1>
        <p style="color: #94a3b8;">Deslize na tela para mover a cobra</p>
        <button onclick="startGame()">INICIAR</button>
    </div>

    <!-- Tela de Game Over -->
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color: #ef4444; font-size: 40px; margin-bottom: 10px;">FIM DE JOGO</h1>
        <div id="finalScore" style="font-size: 50px; font-weight: bold; font-family: 'Orbitron'; color: var(--accent); margin-bottom: 20px;">0</div>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 30; 
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let food = {x: 5, y: 5};
    let currentFoodType = {name: "Maçã", color: "#ef4444"};
    let dx = 0, dy = 0;
    let score = 0;
    let isDead = false;
    let gameActive = false;

    // Áudio Sintetizado
    let audioCtx;
    function playSound(freq, endFreq, dur) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('startScreen').style.display = 'none';
        gameActive = true;
        dx = 1; dy = 0; // Começa movendo para direita
        loop();
    }

    // --- NOVA LÓGICA DE TOQUE 100% OTIMIZADA PARA MOBILE ---
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: false});

    // Impede a tela do celular de ser arrastada (efeito elástico) durante o jogo
    document.addEventListener('touchmove', e => {
        e.preventDefault(); 
    }, {passive: false});

    document.addEventListener('touchend', e => {
        if (!gameActive || isDead) return;

        let touchEndX = e.changedTouches[0].screenX;
        let touchEndY = e.changedTouches[0].screenY;

        let diffX = touchStartX - touchEndX;
        let diffY = touchStartY - touchEndY;

        // Limite mínimo de arraste de 30px (evita toques acidentais ou muito curtos)
        if (Math.abs(diffX) > 30 || Math.abs(diffY) > 30) {
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Arraste Horizontal
                if (diffX > 0 && dx !== 1) { dx = -1; dy = 0; } // Deslizou para a Esquerda
                else if (diffX < 0 && dx !== -1) { dx = 1; dy = 0; } // Deslizou para a Direita
            } else {
                // Arraste Vertical
                if (diffY > 0 && dy !== 1) { dx = 0; dy = -1; } // Deslizou para Cima
                else if (diffY < 0 && dy !== -1) { dx = 0; dy = 1; } // Deslizou para Baixo
            }
        }
    });

    // Teclado para PC
    document.addEventListener('keydown', e => {
        if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; }
        if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; }
        if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; }
        if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; }
    });

    function draw() {
        // Fundo
        ctx.fillStyle = "#050b14";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Comida 3D
        ctx.fillStyle = currentFoodType.color;
        ctx.beginPath();
        ctx.arc(food.x*gridSize+15, food.y*gridSize+15, 12, 0, 7);
        ctx.fill();

        // Cobra Contínua e Volumosa
        ctx.strokeStyle = "#4285F4";
        ctx.lineWidth = 26;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.beginPath();
        snake.forEach((p, i) => {
            if(i === 0) ctx.moveTo(p.x*gridSize+15, p.y*gridSize+15);
            else ctx.lineTo(p.x*gridSize+15, p.y*gridSize+15);
        });
        ctx.stroke();

        // Olhos da cabeça
        const head = snake[0];
        ctx.fillStyle = "white";
        
        // Direcionando os olhos conforme o movimento
        let eyeOffsetX = 10, eyeOffsetY = 10;
        let eye2OffsetX = 20, eye2OffsetY = 10;
        
        if (dx === -1) { eyeOffsetX = 5; eye2OffsetX = 5; eyeOffsetY = 10; eye2OffsetY = 20; }
        else if (dx === 1) { eyeOffsetX = 25; eye2OffsetX = 25; eyeOffsetY = 10; eye2OffsetY = 20; }
        else if (dy === 1) { eyeOffsetX = 10; eye2OffsetX = 20; eyeOffsetY = 25; eye2OffsetY = 25; }

        ctx.beginPath(); ctx.arc(head.x*gridSize+eyeOffsetX, head.y*gridSize+eyeOffsetY, 4, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(head.x*gridSize+eye2OffsetX, head.y*gridSize+eye2OffsetY, 4, 0, 7); ctx.fill();
    }

    function update() {
        if(!gameActive || isDead) return;

        let h = {x: snake[0].x + dx, y: snake[0].y + dy};

        if(h.x < 0 || h.x >= tileCount || h.y < 0 || h.y >= tileCount || snake.some(p => p.x === h.x && p.y === h.y)) {
            isDead = true;
            playSound(150, 50, 0.5);
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').innerText = score;
            return;
        }

        snake.unshift(h);
        if(h.x === food.x && h.y === food.y) {
            score += 10;
            document.getElementById('score').innerText = score;
            playSound(600, 1000, 0.1);
            food = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
        } else {
            snake.pop();
        }
    }

    function loop() {
        update();
        draw();
        if(!isDead) setTimeout(loop, 120);
    }

    function resetGame() {
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        dx = 1; dy = 0; score = 0; isDead = false;
        document.getElementById('score').innerText = "0";
        document.getElementById('gameOver').style.display = 'none';
        loop();
    }
</script>
</body>
</html>
