<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Slither Style AI - Mundo Aberto</title>
    
    <link rel="icon" type="image/png" href="icone.png">
    <link rel="apple-touch-icon" href="icone.png">
    
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --accent: #10b981;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100dvh; width: 100vw;
            overflow: hidden; touch-action: none;
        }
        .stats {
            width: 90vw; max-width: 500px;
            display: flex; justify-content: space-between;
            padding: 15px 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px; margin-bottom: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        canvas {
            background: #0c101b;
            border: 4px solid #1e293b;
            border-radius: 24px;
            width: 90vw; height: 90vw;
            max-width: 500px; max-height: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            display: block; margin: 0 auto;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px;
            background: linear-gradient(135deg, #4285F4, #0d47a1); 
            border: none;
            color: white; border-radius: 15px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 25px rgba(66, 133, 244, 0.4);
            margin-top: 20px;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="stats">
        <div>SCORE: <span id="score" style="color: #40c4ff;">0</span></div>
        <div id="sizeDisplay" style="font-weight: 800;">TAMANHO: <span id="snakeSize" style="color: var(--accent)">3</span></div>
    </div>
    
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div id="startScreen" class="overlay">
        <h1 style="font-family: 'Orbitron'; color: #4285F4; font-size: 42px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(66,133,244,0.3);">MUNDO ABERTO</h1>
        <p style="color: #64748b; padding: 0 20px;">Devore as frutas e morda o rabo dos inimigos menores!</p>
        <button onclick="startGame()">INICIAR</button>
    </div>

    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color: #ef4444; font-size: 40px; margin: 0; text-shadow: 0 0 20px rgba(239,68,68,0.3);">VOCÊ MORREU</h1>
        <div id="finalScore" style="font-size: 50px; font-weight: bold; font-family: 'Orbitron'; color: #4285F4; margin-bottom: 20px;">0</div>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // --- CONFIGURAÇÕES DO MUNDO ---
    const gridSize = 30; 
    const worldTiles = 60; // Mapa gigante de 60x60 blocos
    
    const foodTypes = [
        { name: "Maçã", color: "#ff4757", points: 10 },
        { name: "Uva", color: "#ffa502", points: 10 },
        { name: "Laranja", color: "#ff7f50", points: 10 },
        { name: "Mirtilo", color: "#2e86de", points: 10 },
        { name: "Pera", color: "#2ed573", points: 10 }
    ];

    let snake = [];
    let foods = [];
    const maxFoods = 35; // Mais frutas espalhadas
    
    let dx = 0, dy = 0, score = 0, isDead = false, gameActive = false;
    let mudandoDirecao = false; 

    // Câmera do Jogo
    let cameraX = 0;
    let cameraY = 0;

    // Inteligência Artificial (Bots)
    let bots = [];
    const numBots = 6; // Mais inimigos no mundo aberto
    const botColors = ["#ff4757", "#ffa502", "#a855f7", "#e84393", "#f1c40f"];

    function initBots() {
        bots = [];
        for(let i = 0; i < numBots; i++) {
            spawnBot();
        }
    }

    function spawnBot() {
        // Nasce num lugar aleatório no mapa com 4 blocos de tamanho
        let bx = Math.floor(Math.random() * (worldTiles - 10)) + 5;
        let by = Math.floor(Math.random() * (worldTiles - 10)) + 5;
        let bColor = botColors[Math.floor(Math.random() * botColors.length)];
        bots.push({
            body: [{x: bx, y: by}, {x: bx, y: by}, {x: bx, y: by}, {x: bx, y: by}],
            dx: 1, dy: 0,
            color: bColor,
            isDead: false
        });
    }

    const logoImg = new Image();
    logoImg.src = 'icone.png';

    let audioCtx;
    function playEffect(type) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        const currentTime = audioCtx.currentTime;

        if(type === 'eat') {
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(450, currentTime);
            osc.frequency.exponentialRampToValueAtTime(950, currentTime + 0.08);
            g.gain.setValueAtTime(0.05, currentTime);
            g.gain.linearRampToValueAtTime(0, currentTime + 0.08);
            osc.start(currentTime); osc.stop(currentTime + 0.08);
        } else if(type === 'bite') { // Som novo para morder rabo
            osc.type = 'square'; 
            osc.frequency.setValueAtTime(300, currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, currentTime + 0.15);
            g.gain.setValueAtTime(0.1, currentTime);
            g.gain.linearRampToValueAtTime(0, currentTime + 0.15);
            osc.start(currentTime); osc.stop(currentTime + 0.15);
        } else if(type === 'dead') {
            osc.type = 'sawtooth'; 
            osc.frequency.setValueAtTime(260, currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, currentTime + 0.35);
            g.gain.setValueAtTime(0.15, currentTime);
            g.gain.linearRampToValueAtTime(0, currentTime + 0.35);
            osc.start(currentTime); osc.stop(currentTime + 0.35);
        }
    }

    function startGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('startScreen').style.display = 'none';
        resetGame();
    }

    let tX = 0, tY = 0;
    document.addEventListener('touchstart', e => {
        tX = e.changedTouches[0].screenX;
        tY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (!gameActive || isDead || mudandoDirecao) return;
        let dX = tX - e.changedTouches[0].screenX;
        let dY = tY - e.changedTouches[0].screenY;
        if (Math.abs(dX) > 25 || Math.abs(dY) > 25) {
            if (Math.abs(dX) > Math.abs(dY)) {
                if (dX > 0 && dx !== 1) { dx = -1; dy = 0; mudandoDirecao = true; } 
                else if (dX < 0 && dx !== -1) { dx = 1; dy = 0; mudandoDirecao = true; } 
            } else {
                if (dY > 0 && dy !== 1) { dx = 0; dy = -1; mudandoDirecao = true; } 
                else if (dY < 0 && dy !== -1) { dx = 0; dy = 1; mudandoDirecao = true; } 
            }
        }
    });

    document.addEventListener('keydown', e => {
        if (mudandoDirecao) return;
        if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; mudandoDirecao = true; }
        if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; mudandoDirecao = true; }
        if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; mudandoDirecao = true; }
        if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; mudandoDirecao = true; }
    });

    function drawWorld() {
        ctx.fillStyle = "#0c101b"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        // Centralizar câmera no jogador
        cameraX = (snake[0].x * gridSize + 15) - canvas.width / 2;
        cameraY = (snake[0].y * gridSize + 15) - canvas.height / 2;
        
        ctx.translate(-cameraX, -cameraY);

        // Grade Hexagonal baseada na Câmera
        ctx.strokeStyle = "rgba(22, 27, 38, 0.6)"; 
        ctx.lineWidth = 2;
        const hexRadius = 22; const hexHeight = hexRadius * Math.sqrt(3);
        
        // Renderiza apenas os hexágonos que aparecem na tela
        const startCol = Math.max(-1, Math.floor(cameraX / (hexRadius * 1.5)) - 1);
        const endCol = Math.min((worldTiles * gridSize) / (hexRadius * 1.5) + 1, Math.floor((cameraX + canvas.width) / (hexRadius * 1.5)) + 2);
        const startRow = Math.max(-1, Math.floor(cameraY / hexHeight) - 1);
        const endRow = Math.min((worldTiles * gridSize) / hexHeight + 1, Math.floor((cameraY + canvas.height) / hexHeight) + 2);

        for (let row = startRow; row < endRow; row++) {
            for (let col = startCol; col < endCol; col++) {
                let cx = col * hexRadius * 1.5;
                let cy = row * hexHeight;
                if (col % 2 === 1) cy += hexHeight * 0.5;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    let angle = (Math.PI / 3) * i;
                    let x = cx + hexRadius * Math.cos(angle);
                    let y = cy + hexRadius * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            }
        }

        // Borda do Mundo (Neon Vermelho)
        ctx.strokeStyle = "rgba(239, 68, 68, 0.8)";
        ctx.lineWidth = 10;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#ef4444";
        ctx.strokeRect(0, 0, worldTiles * gridSize, worldTiles * gridSize);
        ctx.shadowBlur = 0; // Desliga a sombra para não bugar as comidas

        // 1. Desenhar Todas as Comidas
        foods.forEach(f => {
            const cx = f.x * 30 + 15; const cy = f.y * 30 + 15;
            ctx.save();
            let foodGlow = ctx.createRadialGradient(cx, cy, 2, cx, cy, 15);
            foodGlow.addColorStop(0, '#ffffff');
            foodGlow.addColorStop(0.3, f.type.color);
            foodGlow.addColorStop(0.7, f.type.color + '44');
            foodGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = foodGlow;
            ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });

        // 2. Desenhar Todos os Bots
        bots.forEach(bot => {
            if(bot.isDead) return;
            ctx.save();
            ctx.shadowBlur = 10; ctx.shadowColor = bot.color;
            ctx.strokeStyle = bot.color; ctx.lineWidth = 22;
            ctx.lineJoin = "round"; ctx.lineCap = "round";
            
            ctx.beginPath();
            bot.body.forEach((p, i) => {
                if(i === 0) ctx.moveTo(p.x*30+15, p.y*30+15);
                else ctx.lineTo(p.x*30+15, p.y*30+15);
            });
            ctx.stroke();

            // Olhos simples dos Bots
            ctx.fillStyle = "white";
            let hX = bot.body[0].x*30+15, hY = bot.body[0].y*30+15;
            ctx.beginPath(); ctx.arc(hX-5, hY-5, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(hX+5, hY-5, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(hX-5+(bot.dx*2), hY-5+(bot.dy*2), 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(hX+5+(bot.dx*2), hY-5+(bot.dy*2), 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        });

        // 3. Desenhar a Cobra do Jogador
        ctx.save();
        ctx.shadowBlur = 15; ctx.shadowColor = "rgba(64, 196, 255, 0.4)";
        ctx.strokeStyle = "#40c4ff"; ctx.lineWidth = 26;
        ctx.lineJoin = "round"; ctx.lineCap = "round";
        
        ctx.beginPath();
        snake.forEach((p, i) => {
            if(i === 0) ctx.moveTo(p.x*30+15, p.y*30+15);
            else ctx.lineTo(p.x*30+15, p.y*30+15);
        });
        ctx.stroke();
        ctx.restore();

        // Cabeça do Jogador
        const h = snake[0];
        const hX = h.x * 30 + 15; const hY = h.y * 30 + 15;
        ctx.save();
        ctx.fillStyle = "#0091ea";
        ctx.beginPath(); ctx.arc(hX, hY, 15, 0, Math.PI * 2); ctx.fill();
        try {
            ctx.beginPath(); ctx.arc(hX, hY, 12, 0, Math.PI * 2); ctx.clip();
            ctx.drawImage(logoImg, hX - 12, hY - 12, 24, 24);
        } catch(e) {}
        ctx.restore();

        // Olhos Dinâmicos
        ctx.fillStyle = "white";
        let eyeX1 = 8, eyeY1 = 8, eyeX2 = 22, eyeY2 = 8;
        if (dx === -1) { eyeX1 = 4; eyeX2 = 4; eyeY1 = 8; eyeY2 = 22; } 
        else if (dx === 1) { eyeX1 = 26; eyeX2 = 26; eyeY1 = 8; eyeY2 = 22; } 
        else if (dy === 1) { eyeX1 = 8; eyeX2 = 22; eyeY1 = 26; eyeY2 = 26; } 

        ctx.beginPath(); ctx.arc(h.x*30+eyeX1, h.y*30+eyeY1, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x*30+eyeX2, h.y*30+eyeY2, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(h.x*30+eyeX1 + (dx*1.5), h.y*30+eyeY1 + (dy*1.5), 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x*30+eyeX2 + (dx*1.5), h.y*30+eyeY2 + (dy*1.5), 2, 0, Math.PI * 2); ctx.fill();
        
        ctx.restore(); // Fecha o estado da Câmera
    }

    function initFoods() {
        foods = [];
        for(let i = 0; i < maxFoods; i++) spawnFood();
    }

    function spawnFood() {
        foods.push({
            x: Math.floor(Math.random()*worldTiles), 
            y: Math.floor(Math.random()*worldTiles),
            type: foodTypes[Math.floor(Math.random()*foodTypes.length)]
        });
    }

    function triggerGameOver() {
        isDead = true; 
        playEffect('dead'); 
        document.getElementById('gameOver').style.display = 'flex';
        document.getElementById('finalScore').innerText = score;
    }

    function update() {
        if(!gameActive || isDead) return;
        mudandoDirecao = false; 

        // 1. Movimento dos Bots
        bots.forEach(bot => {
            if(bot.isDead) return;
            
            // Bot busca a comida mais próxima
            let closestFood = foods[0];
            let minDist = Infinity;
            for(let f of foods) {
                let dist = Math.abs(bot.body[0].x - f.x) + Math.abs(bot.body[0].y - f.y);
                if(dist < minDist) { minDist = dist; closestFood = f; }
            }

            // Evitar paredes e calcular melhor rota
            let moves = [{x: 1, y: 0}, {x: -1, y: 0}, {x: 0, y: 1}, {x: 0, y: -1}];
            moves = moves.filter(m => {
                let nx = bot.body[0].x + m.x;
                let ny = bot.body[0].y + m.y;
                if(nx < 0 || nx >= worldTiles || ny < 0 || ny >= worldTiles) return false;
                if(m.x === -bot.dx && m.y === -bot.dy) return false;
                return true;
            });

            if(moves.length > 0) {
                moves.sort((a,b) => {
                    let distA = Math.abs((bot.body[0].x + a.x) - closestFood.x) + Math.abs((bot.body[0].y + a.y) - closestFood.y);
                    let distB = Math.abs((bot.body[0].x + b.x) - closestFood.x) + Math.abs((bot.body[0].y + b.y) - closestFood.y);
                    return distA - distB;
                });
                bot.dx = moves[0].x; bot.dy = moves[0].y;
            }

            let botHead = {x: bot.body[0].x + bot.dx, y: bot.body[0].y + bot.dy};
            bot.body.unshift(botHead);
            
            // Bot comendo comida
            let ateFoodIndex = -1;
            for(let f=0; f<foods.length; f++) {
                if(botHead.x === foods[f].x && botHead.y === foods[f].y) {
                    ateFoodIndex = f; break;
                }
            }
            if(ateFoodIndex !== -1) {
                foods.splice(ateFoodIndex, 1);
                spawnFood(); 
            } else {
                bot.body.pop();
            }
        });

        // 2. Movimento do Jogador e Comer Frutas
        let h = {x: snake[0].x + dx, y: snake[0].y + dy};
        snake.unshift(h);
        
        let playerAteFood = -1;
        for(let f=0; f<foods.length; f++) {
            if(h.x === foods[f].x && h.y === foods[f].y) {
                playerAteFood = f; break;
            }
        }

        if(playerAteFood !== -1) {
            score += foods[playerAteFood].type.points; 
            document.getElementById('score').innerText = score;
            document.getElementById('snakeSize').innerText = snake.length;
            playEffect('eat'); 
            foods.splice(playerAteFood, 1);
            spawnFood();
        } else { 
            snake.pop(); 
        }

        // 3. Sistema de Colisão e "Comer o Rabo" (Canibalismo)
        let allSnakes = [{isPlayer: true, body: snake}].concat(bots.filter(b => !b.isDead));

        for (let s1 of allSnakes) {
            let head = s1.body[0];
            if(!head) continue;

            // Bater no Limite do Mundo
            if(head.x < 0 || head.x >= worldTiles || head.y < 0 || head.y >= worldTiles) {
                if(s1.isPlayer) return triggerGameOver(); 
                else { s1.isDead = true; continue; }
            }

            // Bater no corpo de outra cobra (Comer Rabos)
            for (let s2 of allSnakes) {
                if(s1 === s2 || s1.isDead || s2.isDead) continue; // Ignora a si mesma

                for (let i = 0; i < s2.body.length; i++) {
                    if (head.x === s2.body[i].x && head.y === s2.body[i].y) {
                        
                        // Quem é maior?
                        if (s1.body.length > s2.body.length) {
                            // O ATACANTE (s1) É MAIOR! Ele CORTA o oponente (s2) a partir do índice 'i'
                            let cutLength = s2.body.length - i;
                            s2.body.splice(i); // Arranca o pedaço do s2
                            
                            // O atacante cresce com o tamanho roubado
                            for(let j=0; j<cutLength; j++) s1.body.push({...s1.body[s1.body.length-1]});
                            
                            if (s1.isPlayer) {
                                score += cutLength * 15;
                                document.getElementById('score').innerText = score;
                                document.getElementById('snakeSize').innerText = snake.length;
                                playEffect('bite'); // Som agressivo
                            }

                            // Se cortou bem na cabeça (i=0) ou o inimigo ficou sem corpo, ele morre
                            if (i === 0 || s2.body.length === 0) {
                                if (s2.isPlayer) return triggerGameOver();
                                else s2.isDead = true;
                            }
                        } else {
                            // O ATACANTE BATEU NUMA COBRA MAIOR QUE ELE (s1 morre e vira comida para o mundo)
                            if (s1.isPlayer) return triggerGameOver(); 
                            else {
                                // Deixa comida no lugar do corpo do bot morto
                                s1.body.forEach(p => foods.push({x: p.x, y: p.y, type: foodTypes[0]}));
                                s1.isDead = true;
                            }
                        }
                    }
                }
            }
        }

        // 4. Renascer bots mortos (Respawn)
        if(bots.filter(b => !b.isDead).length < numBots) {
            if(Math.random() < 0.05) spawnBot();
        }
    }

    function loop() {
        update(); drawWorld();
        // Aumentei o intervalo para 150ms (Jogo mais lento e estratégico)
        if(!isDead) setTimeout(loop, 150);
    }

    function resetGame() {
        // Cobra nasce num ponto aleatório central do mapa
        let startX = Math.floor(worldTiles/2) + Math.floor(Math.random()*10 - 5);
        let startY = Math.floor(worldTiles/2) + Math.floor(Math.random()*10 - 5);
        snake = [{x: startX, y: startY}, {x: startX-1, y: startY}, {x: startX-2, y: startY}];
        
        dx = 1; dy = 0; score = 0; isDead = false; mudandoDirecao = false;
        document.getElementById('score').innerText = "0";
        document.getElementById('snakeSize').innerText = "3";
        document.getElementById('gameOver').style.display = 'none';
        
        initFoods();
        initBots();
        gameActive = true;
        loop();
    }
</script>
</body>
</html>
