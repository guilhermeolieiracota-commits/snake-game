<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake 3D Mobile</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #10b981;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100dvh; width: 100vw;
            overflow: hidden; touch-action: none;
        }
        .stats {
            width: 90vw; max-width: 500px;
            display: flex; justify-content: space-between;
            padding: 15px 20px; font-family: 'Orbitron', sans-serif;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 12px; margin-bottom: 20px;
        }
        canvas {
            background: #000;
            border: 4px solid #1e293b;
            border-radius: 20px;
            width: 90vw; height: 90vw;
            max-width: 500px; max-height: 500px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: block; margin: 0 auto;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }
        button {
            padding: 20px 50px; font-size: 20px;
            background: var(--accent); border: none;
            color: white; border-radius: 15px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(16,185,129,0.4);
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="stats">
        <div>SCORE: <span id="score">0</span></div>
        <div id="foodDisplay" style="font-weight: 800;">ALVO: <span id="foodLabel" style="color: var(--accent)">Maçã</span></div>
    </div>
    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <!-- Tela Inicial -->
    <div id="startScreen" class="overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--accent); font-size: 40px; margin-bottom: 10px;">SNAKE 3D</h1>
        <p style="color: #94a3b8; padding: 0 20px;">Deslize na tela para mover a cobra</p>
        <button onclick="startGame()">INICIAR</button>
    </div>

    <!-- Tela de Game Over -->
    <div id="gameOver" class="overlay" style="display: none;">
        <h1 style="color: #ef4444; font-size: 40px; margin: 0;">FIM DE JOGO</h1>
        <div id="finalScore" style="font-size: 50px; font-weight: bold; font-family: 'Orbitron'; color: var(--accent); margin-bottom: 20px;">0</div>
        <button onclick="resetGame()">REINICIAR</button>
    </div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 30; 
    const tileCount = canvas.width / gridSize;

    const foodTypes = [
        { name: "Maçã", color: "#ef4444" },
        { name: "Uva", color: "#a855f7" },
        { name: "Laranja", color: "#fb923c" },
        { name: "Mirtilo", color: "#3b82f6" },
        { name: "Pera", color: "#bef264" }
    ];

    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let food = {x: 5, y: 5};
    let currentFood = foodTypes[0];
    let dx = 0, dy = 0, score = 0, isDead = false, gameActive = false;
    let mudandoDirecao = false; 

    // --- SISTEMA DE SOM SINTETIZADO CORRIGIDO ---
    let audioCtx;

    function playEffect(type) {
        if(!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);

        const currentTime = audioCtx.currentTime;

        if(type === 'eat') {
            osc.type = 'sine'; // Som suave para comer
            // Frequência sobe rapidamente para um bip feliz
            osc.frequency.setValueAtTime(400, currentTime);
            osc.frequency.exponentialRampToValueAtTime(1100, currentTime + 0.1);
            
            // Ganho cai rapidamente para não ficar 'apitando'
            g.gain.setValueAtTime(0.1, currentTime);
            g.gain.linearRampToValueAtTime(0, currentTime + 0.1);
            
            osc.start(currentTime); osc.stop(currentTime + 0.1);
        } else if(type === 'dead') {
            osc.type = 'sawtooth'; // Som agressivo para morte
            // Frequência cai drasticamente
            osc.frequency.setValueAtTime(300, currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, currentTime + 0.4);
            
            // Mais volume no início, caindo gradualmente
            g.gain.setValueAtTime(0.2, currentTime);
            g.gain.linearRampToValueAtTime(0, currentTime + 0.4);
            
            osc.start(currentTime); osc.stop(currentTime + 0.4);
        }
    }

    function startGame() {
        // CORREÇÃO MÓVEL: Criar E retomar o contexto no mesmo gesto
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => {
                console.log('Áudio ativado');
            });
        }

        document.getElementById('startScreen').style.display = 'none';
        gameActive = true;
        dx = 1; dy = 0;
        spawnFood();
        loop();
    }

    // --- CONTROLES TOUCH (SWIPE) CORRIGIDOS ---
    let tX = 0, tY = 0;
    
    document.addEventListener('touchstart', e => {
        tX = e.changedTouches[0].screenX;
        tY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        if (!gameActive || isDead || mudandoDirecao) return;
        
        let dX = tX - e.changedTouches[0].screenX;
        let dY = tY - e.changedTouches[0].screenY;
        
        if (Math.abs(dX) > 30 || Math.abs(dY) > 30) {
            if (Math.abs(dX) > Math.abs(dY)) {
                if (dX > 0 && dx !== 1) { dx = -1; dy = 0; mudandoDirecao = true; } // Esquerda
                else if (dX < 0 && dx !== -1) { dx = 1; dy = 0; mudandoDirecao = true; } // Direita
            } else {
                if (dY > 0 && dy !== 1) { dx = 0; dy = -1; mudandoDirecao = true; } // Cima
                else if (dY < 0 && dy !== -1) { dx = 0; dy = 1; mudandoDirecao = true; } // Baixo
            }
        }
    });

    // Teclado PC com Trava
    document.addEventListener('keydown', e => {
        if (mudandoDirecao) return;
        if(e.key === "ArrowLeft" && dx !== 1) { dx = -1; dy = 0; mudandoDirecao = true; }
        if(e.key === "ArrowUp" && dy !== 1) { dx = 0; dy = -1; mudandoDirecao = true; }
        if(e.key === "ArrowRight" && dx !== -1) { dx = 1; dy = 0; mudandoDirecao = true; }
        if(e.key === "ArrowDown" && dy !== -1) { dx = 0; dy = 1; mudandoDirecao = true; }
    });

    function draw() {
        ctx.fillStyle = "#050b14"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Comida
        ctx.fillStyle = currentFood.color;
        ctx.shadowBlur = 15; ctx.shadowColor = currentFood.color;
        ctx.beginPath(); ctx.arc(food.x*30+15, food.y*30+15, 12, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;

        // Cobra
        ctx.strokeStyle = "#4285F4"; ctx.lineWidth = 26; ctx.lineJoin = "round"; ctx.lineCap = "round";
        ctx.beginPath();
        snake.forEach((p, i) => {
            if(i === 0) ctx.moveTo(p.x*30+15, p.y*30+15);
            else ctx.lineTo(p.x*30+15, p.y*30+15);
        });
        ctx.stroke();

        // Olhos Dinâmicos (Acompanhando o Movimento)
        const h = snake[0]; 
        ctx.fillStyle = "white";
        
        let eyeOffsetX1 = 10, eyeOffsetY1 = 10;
        let eyeOffsetX2 = 20, eyeOffsetY2 = 10;
        
        if (dx === -1) { eyeOffsetX1 = 5; eyeOffsetX2 = 5; eyeOffsetY1 = 10; eyeOffsetY2 = 20; } // Olha Esq
        else if (dx === 1) { eyeOffsetX1 = 25; eyeOffsetX2 = 25; eyeOffsetY1 = 10; eyeOffsetY2 = 20; } // Olha Dir
        else if (dy === 1) { eyeOffsetX1 = 10; eyeOffsetX2 = 20; eyeOffsetY1 = 25; eyeOffsetY2 = 25; } // Olha Baixo

        ctx.beginPath(); ctx.arc(h.x*30+eyeOffsetX1, h.y*30+eyeOffsetY1, 4, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x*30+eyeOffsetX2, h.y*30+eyeOffsetY2, 4, 0, 7); ctx.fill();
    }

    function spawnFood() {
        food = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
        currentFood = foodTypes[Math.floor(Math.random()*foodTypes.length)];
        const label = document.getElementById('foodLabel');
        label.innerText = currentFood.name;
        label.style.color = currentFood.color;
    }

    function update() {
        if(!gameActive || isDead) return;
        mudandoDirecao = false; // Libera o próximo movimento
        
        let h = {x: snake[0].x + dx, y: snake[0].y + dy};

        // Verificação de Morte (Bater na parede ou em si mesma)
        if(h.x < 0 || h.x >= tileCount || h.y < 0 || h.y >= tileCount || snake.some(p => p.x === h.x && p.y === h.y)) {
            isDead = true; 
            playEffect('dead'); // TOCAR SOM DE MORTE
            
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').innerText = score;
            return;
        }

        snake.unshift(h);
        
        // Verificação de Comer
        if(h.x === food.x && h.y === food.y) {
            score += 10; document.getElementById('score').innerText = score;
            playEffect('eat'); // TOCAR SOM DE COMER
            spawnFood();
        } else { snake.pop(); }
    }

    function loop() {
        update(); draw();
        if(!isDead) setTimeout(loop, 120);
    }

    function resetGame() {
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        dx = 1; dy = 0; score = 0; isDead = false; mudandoDirecao = false;
        document.getElementById('score').innerText = "0";
        document.getElementById('gameOver').style.display = 'none';
        spawnFood(); loop();
    }
</script>
</body>
</html>
